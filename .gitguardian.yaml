secret:
  ignored_matches:
  - match: e2e-session-secret-0000000000000000000000
    name: e2e-session-secret placeholder
  - match: dev-centrifugo-hmac-secret-change-me
    name: .env.example centrifugo hmac
  - match: dev-centrifugo-api-key-change-me
    name: .env.example centrifugo api key
  - match: dev-session-secret-change-me-32chars!!
