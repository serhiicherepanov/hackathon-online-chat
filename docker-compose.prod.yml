#
# Self-contained production compose file. Use instead of docker-compose.yml:
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Differences vs. docker-compose.yml (development):
#   - app builds the `production` Dockerfile target (real `next build`)
#   - NEXT_PUBLIC_CENTRIFUGO_WS_URL is passed as a build ARG so it gets
#     inlined into the client bundle
#   - no source bind-mount / dev caches (the baked .next wins)
#   - NODE_ENV=production, no file-watcher polling
#
services:
  traefik:
    image: traefik:v3.6
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.constraints=Label(`chat.traefik`,`true`)"
      - "--entrypoints.web.address=:3080"
      - "--log.level=INFO"
      - "--log.format=json"
      - "--accesslog=false"
    ports:
      - "${TRAEFIK_BIND_PORT:-3080}:3080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      app:
        condition: service_healthy
      centrifugo:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chat"]
      interval: 2s
      timeout: 3s
      retries: 20

  centrifugo:
    image: centrifugo/centrifugo:v6
    command: centrifugo -c /centrifugo/config.json
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro
    environment:
      # Centrifugo 6 maps env vars to config paths: CENTRIFUGO_<PATH>. Using
      # our legacy CENTRIFUGO_API_KEY / CENTRIFUGO_TOKEN_HMAC_SECRET names
      # resulted in "unknown var in environment" warnings and the HTTP API
      # falling back to an empty key — causing 401 on every publish/
      # broadcast/presence call. Map to the real config paths.
      CENTRIFUGO_HTTP_API_KEY: "${CENTRIFUGO_API_KEY:?set CENTRIFUGO_API_KEY in .env}"
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: "${CENTRIFUGO_TOKEN_HMAC_SECRET:?set CENTRIFUGO_TOKEN_HMAC_SECRET in .env}"
      # Browser Origin header allowlist for /connection/websocket. Must include
      # the public HTTPS origin the app is served from (no trailing slash).
      CENTRIFUGO_CLIENT_ALLOWED_ORIGINS: "${CENTRIFUGO_CLIENT_ALLOWED_ORIGINS:?set CENTRIFUGO_CLIENT_ALLOWED_ORIGINS to your public https:// origin}"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    labels:
      - "traefik.enable=true"
      - "chat.traefik=true"
      - "traefik.http.routers.centrifugo.rule=PathPrefix(`/connection`)"
      - "traefik.http.routers.centrifugo.entrypoints=web"
      - "traefik.http.routers.centrifugo.priority=100"
      - "traefik.http.services.centrifugo.loadbalancer.server.port=3080"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_CENTRIFUGO_WS_URL: "${NEXT_PUBLIC_CENTRIFUGO_WS_URL:?set NEXT_PUBLIC_CENTRIFUGO_WS_URL to your wss:// URL}"
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: "${NEXT_PUBLIC_VAPID_PUBLIC_KEY:?set NEXT_PUBLIC_VAPID_PUBLIC_KEY to your VAPID public key (generate via pnpm tsx scripts/gen-vapid.ts)}"
    depends_on:
      db:
        condition: service_healthy
      centrifugo:
        condition: service_started
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://chat:chat@db:5432/chat?schema=public}"
      CENTRIFUGO_TOKEN_HMAC_SECRET: "${CENTRIFUGO_TOKEN_HMAC_SECRET:?set CENTRIFUGO_TOKEN_HMAC_SECRET in .env}"
      CENTRIFUGO_API_KEY: "${CENTRIFUGO_API_KEY:?set CENTRIFUGO_API_KEY in .env}"
      CENTRIFUGO_URL: "${CENTRIFUGO_URL:-http://centrifugo:3080}"
      NEXT_PUBLIC_CENTRIFUGO_WS_URL: "${NEXT_PUBLIC_CENTRIFUGO_WS_URL}"
      SESSION_SECRET: "${SESSION_SECRET:?set SESSION_SECRET to a 32+ char random value}"
      SESSION_COOKIE_DOMAIN: "${SESSION_COOKIE_DOMAIN:-}"
      UPLOADS_DIR: "${UPLOADS_DIR:-/app/uploads}"
      PASSWORD_RESET_DELIVERY_FILE: "${PASSWORD_RESET_DELIVERY_FILE:-/app/uploads/password-reset-deliveries.log}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: "${NEXT_PUBLIC_VAPID_PUBLIC_KEY:?set NEXT_PUBLIC_VAPID_PUBLIC_KEY}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:?set VAPID_PRIVATE_KEY (generate via pnpm tsx scripts/gen-vapid.ts, never commit)}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:?set VAPID_SUBJECT to a mailto: URI identifying the push sender}"
      E2E_FAKE_TIME: "${E2E_FAKE_TIME:-0}"
      NODE_ENV: "production"
      PORT: "3080"
      HOSTNAME: "0.0.0.0"
    volumes:
      - uploads:/app/uploads
    labels:
      - "traefik.enable=true"
      - "chat.traefik=true"
      - "traefik.http.routers.app.rule=PathPrefix(`/`)"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.routers.app.priority=1"
      - "traefik.http.services.app.loadbalancer.server.port=3080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 90s

volumes:
  pgdata:
  uploads:
