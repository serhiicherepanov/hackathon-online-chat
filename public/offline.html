<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Online Chat</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #f8fafc;
        padding: 2rem;
      }
      .card {
        max-width: 24rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
      }
      p {
        margin: 0 0 1.25rem;
        opacity: 0.8;
        line-height: 1.5;
      }
      a {
        display: inline-block;
        padding: 0.625rem 1.25rem;
        border-radius: 0.5rem;
        background: #f8fafc;
        color: #0f172a;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You&rsquo;re offline</h1>
      <p>Online Chat needs an internet connection. Check your network and try again.</p>
      <a href="/" id="retry">Retry</a>
    </main>
  </body>
</html>
